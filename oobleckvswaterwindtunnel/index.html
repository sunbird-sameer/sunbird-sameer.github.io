<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Non-Newtonian vs Newtonian Fluid</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d0e12;
  --surface: #13151b;
  --border:  #1c1f28;
  --text:    #dde3f0;
  --dim:     #555d72;
  --accent:  #4d9fff;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 14px; }

#app   { display: flex; flex-direction: column; height: 100dvh; }
#stage { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* Header */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0; gap: 12px;
}
.title { font-size: .85rem; font-weight: 600; color: var(--text); }
.pair-counter { font-size: .8rem; color: var(--dim); white-space: nowrap; }
.pair-counter strong { color: var(--text); }

/* Set tabs */
#set-tabs {
  display: flex; gap: 6px; align-items: center;
  padding: 8px 16px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
}
#set-tabs::-webkit-scrollbar { display: none; }
.set-tab {
  font-size: .78rem; font-weight: 500;
  padding: 5px 14px; border-radius: 4px; border: 1px solid var(--border);
  background: transparent; color: var(--dim);
  cursor: pointer; white-space: nowrap; transition: all .12s;
  touch-action: manipulation; min-height: 32px;
}
.set-tab:hover { border-color: var(--accent); color: var(--accent); }
.set-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* Panels */
.panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
.panel + .panel { border-left: 1px solid var(--border); }
.panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 14px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.panel-label { font-size: .75rem; font-weight: 600; color: var(--text); }
.panel-fname { font-size: .7rem; color: var(--dim); max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.img-wrap { flex: 1; position: relative; overflow: hidden; display: grid; place-items: center; background: var(--bg); }
.img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; opacity: 0; transition: opacity .2s ease; }
.img-wrap img.show { opacity: 1; }

.skeleton { position: absolute; inset: 0; background: linear-gradient(90deg, var(--surface) 25%, #1a1d26 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; transition: opacity .15s; }
.skeleton.done { opacity: 0; pointer-events: none; }
@keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

/* Thumbnails */
#thumbs {
  display: flex; gap: 4px; align-items: center;
  padding: 6px 14px; border-top: 1px solid var(--border);
  background: var(--surface); overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
#thumbs::-webkit-scrollbar { display: none; }
.thumb {
  flex-shrink: 0; width: 40px; height: 40px; border-radius: 4px;
  overflow: hidden; cursor: pointer; position: relative;
  border: 2px solid transparent; transition: border-color .12s;
}
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb.active { border-color: var(--accent); }
.thumb-num { position: absolute; bottom: 1px; right: 2px; font-size: .5rem; color: rgba(255,255,255,.9); text-shadow: 0 1px 2px #000; line-height: 1; }

/* Progress */
#prog-track { height: 2px; background: var(--border); flex-shrink: 0; }
#prog-fill { height: 100%; background: var(--accent); transition: width .25s ease; width: 0%; }

/* Nav */
#nav {
  display: flex; align-items: center; justify-content: center;
  gap: 10px; padding: 10px 16px; border-top: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.btn {
  font-size: .78rem; font-weight: 500;
  padding: 8px 22px; border-radius: 4px; border: 1px solid var(--border);
  cursor: pointer; transition: background .12s; background: var(--surface);
  color: var(--text); min-height: 44px; touch-action: manipulation;
}
.btn:disabled { opacity: .35; pointer-events: none; }
.btn:active { opacity: .7; }
.btn-prev:hover { background: var(--bg); }
.btn-next { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-next:hover { opacity: .88; }
.nav-hint { font-size: .72rem; color: var(--dim); }

/* Overlay */
#overlay { position: fixed; inset: 0; z-index: 99; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; text-align: center; padding: 32px; }
#overlay.hidden { display: none; }
.ov-title { font-size: 1rem; font-weight: 600; }
.ov-body  { font-size: .8rem; color: var(--dim); max-width: 320px; line-height: 1.7; }
.spinner  { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Mobile portrait */
@media (max-width: 600px) {
  #stage { flex-direction: column; }
  .panel + .panel { border-left: none; border-top: 1px solid var(--border); }
  .panel-fname { display: none; }
  #thumbs { padding: 5px 12px; }
  .thumb { width: 34px; height: 34px; }
  #nav { padding: 8px 12px; gap: 8px; }
  .btn { flex: 1; padding: 10px 8px; }
  .nav-hint { display: none; }
}

/* Mobile landscape */
@media (max-height: 500px) {
  .panel-hdr { padding: 4px 12px; }
  #thumbs { display: none; }
  #nav { padding: 6px 14px; }
  .nav-hint { display: none; }
}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="title">Fluid Comparison</div>
    <div class="pair-counter">Pair <strong id="idx">—</strong> / <strong id="tot">—</strong></div>
  </header>

  <div id="set-tabs"></div>

  <div id="prog-track"><div id="prog-fill"></div></div>

  <div id="stage">
    <div class="panel panel-a">
      <div class="panel-hdr">
        <div class="panel-label">Non-Newtonian Fluid (Oobleck)</div>
        <div class="panel-fname" id="fn-a">—</div>
      </div>
      <div class="img-wrap">
        <div class="skeleton" id="sk-a"></div>
        <img id="img-a" alt="non-newtonian fluid">
      </div>
    </div>
    <div class="panel panel-b">
      <div class="panel-hdr">
        <div class="panel-label">Newtonian Fluid (Water)</div>
        <div class="panel-fname" id="fn-b">—</div>
      </div>
      <div class="img-wrap">
        <div class="skeleton" id="sk-b"></div>
        <img id="img-b" alt="newtonian fluid">
      </div>
    </div>
  </div>

  <div id="thumbs"></div>

  <div id="nav">
    <button class="btn btn-prev" id="btn-prev" disabled>← Prev</button>
    <div class="nav-hint">← → to navigate</div>
    <button class="btn btn-next" id="btn-next" disabled>Next →</button>
  </div>
</div>

<div id="overlay">
  <div class="spinner"></div>
  <div class="ov-title">Loading…</div>
  <div class="ov-body"></div>
</div>

<!-- MANIFEST_INJECT -->
<script>const MANIFEST = {
  "set1": {
    "oobleck": [
      "./set1/oobleck/DSCN7843.JPG","./set1/oobleck/DSCN7844.JPG","./set1/oobleck/DSCN7845.JPG",
      "./set1/oobleck/DSCN7846.JPG","./set1/oobleck/DSCN7847.JPG","./set1/oobleck/DSCN7848.JPG",
      "./set1/oobleck/DSCN7849.JPG","./set1/oobleck/DSCN7850.JPG","./set1/oobleck/DSCN7851.JPG",
      "./set1/oobleck/DSCN7852.JPG","./set1/oobleck/DSCN7853.JPG","./set1/oobleck/DSCN7854.JPG"
    ],
    "water": [
      "./set1/water/DSCN7501.JPG","./set1/water/DSCN7502.JPG","./set1/water/DSCN7503.JPG",
      "./set1/water/DSCN7504.JPG","./set1/water/DSCN7505.JPG","./set1/water/DSCN7506.JPG",
      "./set1/water/DSCN7507.JPG","./set1/water/DSCN7508.JPG","./set1/water/DSCN7509.JPG",
      "./set1/water/DSCN7510.JPG","./set1/water/DSCN7511.JPG","./set1/water/DSCN7512.JPG"
    ]
  },
  "set2": {
    "oobleck": [
      "./set2/oobleck/DSCN7965.JPG","./set2/oobleck/DSCN7966.JPG",
      "./set2/oobleck/DSCN7967.JPG","./set2/oobleck/DSCN7968.JPG"
    ],
    "water": [
      "./set2/water/DSCN8238.JPG","./set2/water/DSCN8239.JPG",
      "./set2/water/DSCN8240.JPG","./set2/water/DSCN8241.JPG"
    ]
  }
};</script>

<script>
let pairs = [], current = 0, activeSet = null;

function init() {
  const sets = Object.keys(MANIFEST);
  if (!sets.length) return;

  const tabBar = document.getElementById('set-tabs');
  sets.forEach(key => {
    const btn = document.createElement('button');
    btn.className = 'set-tab';
    btn.textContent = key.replace(/^set(\d+)$/i, 'Set $1');
    btn.dataset.set = key;
    btn.addEventListener('click', () => loadSet(key));
    tabBar.appendChild(btn);
  });

  document.getElementById('overlay').classList.add('hidden');
  loadSet(sets[0]);
}

function loadSet(key) {
  activeSet = key;
  document.querySelectorAll('.set-tab').forEach(t => t.classList.toggle('active', t.dataset.set === key));

  const data = MANIFEST[key];
  const a = data.oobleck || [];
  const b = data.water   || [];
  const n = Math.min(a.length, b.length);
  pairs = Array.from({ length: n }, (_, i) => ({ a: a[i], b: b[i] }));

  buildThumbs();
  goto(0);
}

function goto(i) {
  current = i;
  setImg('a', pairs[i].a);
  setImg('b', pairs[i].b);

  document.getElementById('idx').textContent = i + 1;
  document.getElementById('tot').textContent = pairs.length;
  document.getElementById('prog-fill').style.width = `${((i + 1) / pairs.length) * 100}%`;
  document.getElementById('btn-prev').disabled = i === 0;
  document.getElementById('btn-next').disabled = i === pairs.length - 1;

  document.querySelectorAll('.thumb').forEach((t, idx) => t.classList.toggle('active', idx === i));
  document.querySelectorAll('.thumb')[i]?.scrollIntoView({ inline: 'center', behavior: 'smooth' });
}

function setImg(side, src) {
  const img = document.getElementById(`img-${side}`);
  const sk  = document.getElementById(`sk-${side}`);
  img.classList.remove('show');
  sk.classList.remove('done');
  img.onload  = () => { sk.classList.add('done'); img.classList.add('show'); };
  img.onerror = () => { sk.classList.add('done'); };
  img.src = src;
  document.getElementById(`fn-${side}`).textContent = src.split('/').pop();
}

function buildThumbs() {
  const bar = document.getElementById('thumbs');
  bar.innerHTML = '';
  pairs.forEach((p, i) => {
    const t = document.createElement('div');
    t.className = 'thumb';
    const img = document.createElement('img');
    img.src = p.a; img.alt = `pair ${i+1}`; img.loading = 'lazy';
    const num = document.createElement('div');
    num.className = 'thumb-num'; num.textContent = i + 1;
    t.append(img, num);
    t.addEventListener('click', () => goto(i));
    bar.appendChild(t);
  });
}

document.getElementById('btn-prev').addEventListener('click', () => { if (current > 0) goto(current - 1); });
document.getElementById('btn-next').addEventListener('click', () => { if (current < pairs.length - 1) goto(current + 1); });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  && current > 0)                goto(current - 1);
  if (e.key === 'ArrowRight' && current < pairs.length - 1) goto(current + 1);
});

let tx = 0, ty = 0;
document.getElementById('stage').addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
document.getElementById('stage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
  if (dx < 0 && current < pairs.length - 1) goto(current + 1);
  if (dx > 0 && current > 0)                goto(current - 1);
}, { passive: true });

init();
</script>
</body>
</html>
