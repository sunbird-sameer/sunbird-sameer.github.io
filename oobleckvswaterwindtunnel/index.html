<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oobleck vs Water</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0d0e12;
  --surface: #13151b;
  --border:  #1c1f28;
  --a:       #e8ff47;   /* oobleck — electric lime */
  --b:       #47d9ff;   /* water   — cyan          */
  --text:    #dde3f0;
  --dim:     #555d72;
  --radius:  10px;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }

/* ── Layout shells ───────────────────────────────────────────── */
#app   { display: flex; flex-direction: column; height: 100dvh; }
#stage { flex: 1; display: flex; overflow: hidden; min-height: 0; }

/* ── Header ──────────────────────────────────────────────────── */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0; gap: 16px;
}

.wordmark {
  display: flex; align-items: center; gap: 8px;
  font-size: .75rem; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
}
.pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pip-a { background: var(--a); box-shadow: 0 0 8px var(--a); }
.pip-b { background: var(--b); box-shadow: 0 0 8px var(--b); }
.wordmark-sep { color: var(--dim); font-weight: 400; }

.hdr-right { display: flex; align-items: center; gap: 16px; }
.pair-counter {
  font-family: 'DM Mono', monospace; font-size: .75rem;
  color: var(--dim); letter-spacing: .06em; white-space: nowrap;
}
.pair-counter strong { color: var(--text); }

/* ── Panels ──────────────────────────────────────────────────── */
.panel {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative;
}
.panel + .panel { border-left: 1px solid var(--border); }

.panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 14px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.panel-label {
  font-size: .62rem; font-weight: 800; letter-spacing: .14em; text-transform: uppercase;
  display: flex; align-items: center; gap: 5px;
}
.panel-a .panel-label { color: var(--a); }
.panel-b .panel-label { color: var(--b); }
.panel-fname {
  font-family: 'DM Mono', monospace; font-size: .62rem; color: var(--dim);
  max-width: 55%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

/* image area */
.img-wrap {
  flex: 1; position: relative; overflow: hidden; background: var(--bg);
  display: grid; place-items: center;
}
.img-wrap img {
  max-width: 100%; max-height: 100%; object-fit: contain; display: block;
  opacity: 0; transition: opacity .28s ease; will-change: opacity;
}
.img-wrap img.show { opacity: 1; }

/* skeleton shimmer while loading */
.skeleton {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--surface) 25%, #1a1d26 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  transition: opacity .2s;
}
.skeleton.done { opacity: 0; pointer-events: none; }
@keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }

/* ── Thumbnail strip ─────────────────────────────────────────── */
#thumbs {
  display: flex; gap: 5px; align-items: center;
  padding: 8px 16px; border-top: 1px solid var(--border);
  background: var(--bg); overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
#thumbs::-webkit-scrollbar { display: none; }

.thumb {
  flex-shrink: 0; width: 44px; height: 44px; border-radius: 6px;
  overflow: hidden; cursor: pointer; position: relative;
  border: 2px solid transparent;
  transition: transform .15s, border-color .15s;
}
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb:hover { transform: scale(1.1); }
.thumb.active {
  border-color: var(--a);
  box-shadow: 0 0 0 2px rgba(232,255,71,.25);
}
.thumb-num {
  position: absolute; bottom: 2px; right: 3px;
  font-family: 'DM Mono', monospace; font-size: .55rem;
  color: rgba(255,255,255,.75); text-shadow: 0 1px 3px #000;
  line-height: 1;
}

/* ── Progress bar ─────────────────────────────────────────────── */
#prog-track { height: 2px; background: var(--border); flex-shrink: 0; }
#prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--a), var(--b));
  transition: width .3s ease; width: 0%;
}

/* ── Nav ─────────────────────────────────────────────────────── */
#nav {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; padding: 12px 20px;
  border-top: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}

.btn {
  font-family: 'Syne', sans-serif; font-weight: 800;
  font-size: .72rem; letter-spacing: .1em; text-transform: uppercase;
  padding: 11px 28px; border-radius: 8px; border: none;
  cursor: pointer; transition: opacity .15s, transform .1s;
  /* bigger tap target on mobile */
  min-height: 44px; touch-action: manipulation;
}
.btn:disabled { opacity: .2; cursor: default; pointer-events: none; }
.btn:active   { transform: scale(.95); }

.btn-prev { background: var(--border); color: var(--text); }
.btn-prev:hover { background: #272b38; }
.btn-next { background: var(--a); color: #000; }
.btn-next:hover { opacity: .85; }

.nav-hint {
  font-family: 'DM Mono', monospace; font-size: .68rem; color: var(--dim);
  display: flex; gap: 10px; align-items: center;
}
.key {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 2px 7px; background: var(--border); border-radius: 4px;
  color: var(--text); font-size: .68rem;
}

/* ── Error / loading overlay ─────────────────────────────────── */
#overlay {
  position: fixed; inset: 0; z-index: 99;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; text-align: center; padding: 32px;
}
#overlay.hidden { display: none; }

.ov-title { font-size: 1.3rem; font-weight: 800; letter-spacing: .04em; }
.ov-body  { font-family: 'DM Mono', monospace; font-size: .82rem; color: var(--dim); max-width: 380px; line-height: 1.8; }
.ov-code  { font-family: 'DM Mono', monospace; font-size: .78rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 20px; color: var(--a); text-align: left; }
.spinner  { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--a); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Mobile: portrait — stack panels vertically ───────────────── */
@media (max-width: 600px) {
  header { padding: 10px 14px; }
  .wordmark { font-size: .68rem; gap: 6px; }

  /* vertical stack */
  #stage { flex-direction: column; }
  .panel + .panel { border-left: none; border-top: 1px solid var(--border); }

  /* tighten panel headers */
  .panel-hdr { padding: 6px 12px; }
  .panel-fname { display: none; } /* no room — filename shown in header */

  /* thumbnails: smaller, more visible */
  #thumbs { padding: 6px 12px; gap: 4px; }
  .thumb  { width: 38px; height: 38px; }

  /* nav buttons fill width */
  #nav { padding: 10px 14px; gap: 10px; }
  .btn { flex: 1; padding: 13px 10px; font-size: .7rem; }
  .nav-hint { display: none; } /* keyboard hint irrelevant on mobile */
}

/* ── Mobile: landscape — side by side but compact ─────────────── */
@media (max-height: 500px) {
  header { padding: 7px 16px; }
  .panel-hdr { padding: 4px 12px; }
  #thumbs { display: none; } /* hide thumbs in landscape to save space */
  #nav { padding: 8px 16px; }
  .btn { padding: 8px 20px; }
  .nav-hint { display: none; }
}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="wordmark">
      <div class="pip pip-a"></div>
      Oobleck
      <span class="wordmark-sep">vs</span>
      Water
      <div class="pip pip-b"></div>
    </div>
    <div class="hdr-right">
      <div class="pair-counter">Pair <strong id="idx">—</strong> / <strong id="tot">—</strong></div>
    </div>
  </header>

  <div id="prog-track"><div id="prog-fill"></div></div>

  <div id="stage">
    <div class="panel panel-a" id="panel-a">
      <div class="panel-hdr">
        <div class="panel-label"><div class="pip pip-a"></div>Oobleck</div>
        <div class="panel-fname" id="fn-a">—</div>
      </div>
      <div class="img-wrap" id="wrap-a">
        <div class="skeleton" id="sk-a"></div>
        <img id="img-a" alt="oobleck">
      </div>
    </div>
    <div class="panel panel-b" id="panel-b">
      <div class="panel-hdr">
        <div class="panel-label"><div class="pip pip-b"></div>Water</div>
        <div class="panel-fname" id="fn-b">—</div>
      </div>
      <div class="img-wrap" id="wrap-b">
        <div class="skeleton" id="sk-b"></div>
        <img id="img-b" alt="water">
      </div>
    </div>
  </div>

  <div id="thumbs"></div>

  <div id="nav">
    <button class="btn btn-prev" id="btn-prev" disabled>← Prev</button>
    <div class="nav-hint"><span class="key">←</span><span class="key">→</span> to navigate</div>
    <button class="btn btn-next" id="btn-next" disabled>Next →</button>
  </div>
</div>

<!-- Overlay for loading / errors -->
<div id="overlay">
  <div class="spinner" id="ov-spinner"></div>
  <div class="ov-title" id="ov-title">Loading manifest…</div>
  <div class="ov-body"  id="ov-body"></div>
  <div class="ov-code"  id="ov-code" style="display:none"></div>
</div>

<!-- MANIFEST_INJECT -->
<script>const MANIFEST = {
  "oobleck": [
    "oobleck/DSCN7843.JPG","oobleck/DSCN7844.JPG","oobleck/DSCN7845.JPG",
    "oobleck/DSCN7846.JPG","oobleck/DSCN7847.JPG","oobleck/DSCN7848.JPG",
    "oobleck/DSCN7849.JPG","oobleck/DSCN7850.JPG","oobleck/DSCN7851.JPG",
    "oobleck/DSCN7852.JPG","oobleck/DSCN7853.JPG","oobleck/DSCN7854.JPG"
  ],
  "water": [
    "water/DSCN7501.JPG","water/DSCN7502.JPG","water/DSCN7503.JPG",
    "water/DSCN7504.JPG","water/DSCN7505.JPG","water/DSCN7506.JPG",
    "water/DSCN7507.JPG","water/DSCN7508.JPG","water/DSCN7509.JPG",
    "water/DSCN7510.JPG","water/DSCN7511.JPG","water/DSCN7512.JPG"
  ]
};</script>
<script>
let pairs = [], current = 0;

// ── Init from inline manifest ─────────────────────────────────────────────────
function init() {
  if (typeof MANIFEST === 'undefined') {
    showError(
      'Manifest not embedded',
      'Run the generator script to inject the file list into this HTML:',
      'python3 generate_manifest.py'
    );
    return;
  }

  const a = MANIFEST['oobleck'] || [];
  const b = MANIFEST['water']   || [];

  if (!a.length || !b.length) {
    showError('No images found', 'Make sure oobleck/ and water/ folders contain images and re-run generate_manifest.py.');
    return;
  }

  const n = Math.min(a.length, b.length);
  pairs   = Array.from({ length: n }, (_, i) => ({ a: a[i], b: b[i] }));

  buildThumbs();
  hideOverlay();
  goto(0);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function goto(i) {
  current = i;
  const pair = pairs[i];

  setImg('a', pair.a);
  setImg('b', pair.b);

  document.getElementById('idx').textContent = i + 1;
  document.getElementById('tot').textContent = pairs.length;
  document.getElementById('prog-fill').style.width = `${((i+1)/pairs.length)*100}%`;

  document.getElementById('btn-prev').disabled = i === 0;
  document.getElementById('btn-next').disabled = i === pairs.length - 1;

  // active thumb
  document.querySelectorAll('.thumb').forEach((t, idx) => t.classList.toggle('active', idx === i));
  document.querySelectorAll('.thumb')[i]?.scrollIntoView({ inline: 'center', behavior: 'smooth' });
}

function setImg(side, src) {
  const img = document.getElementById(`img-${side}`);
  const sk  = document.getElementById(`sk-${side}`);
  const fn  = document.getElementById(`fn-${side}`);

  img.classList.remove('show');
  sk.classList.remove('done');

  img.onload = () => { sk.classList.add('done'); img.classList.add('show'); };
  img.onerror = () => { sk.classList.add('done'); };
  img.src = src;

  fn.textContent = src.split('/').pop();
}

// ── Buttons / keyboard ────────────────────────────────────────────────────────
document.getElementById('btn-prev').addEventListener('click', () => { if (current > 0) goto(current - 1); });
document.getElementById('btn-next').addEventListener('click', () => { if (current < pairs.length - 1) goto(current + 1); });

// ── Swipe gestures ────────────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;
document.getElementById('stage').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById('stage').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
  if (dx < 0 && current < pairs.length - 1) goto(current + 1);
  if (dx > 0 && current > 0)                goto(current - 1);
}, { passive: true });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  && current > 0)                goto(current - 1);
  if (e.key === 'ArrowRight' && current < pairs.length - 1) goto(current + 1);
});

// ── Thumbnails ────────────────────────────────────────────────────────────────
function buildThumbs() {
  const bar = document.getElementById('thumbs');
  bar.innerHTML = '';
  pairs.forEach((p, i) => {
    const t   = document.createElement('div');
    t.className = 'thumb';

    const img = document.createElement('img');
    img.src = p.a;
    img.alt = `pair ${i+1}`;
    img.loading = 'lazy';

    const num = document.createElement('div');
    num.className = 'thumb-num';
    num.textContent = i + 1;

    t.append(img, num);
    t.addEventListener('click', () => goto(i));
    bar.appendChild(t);
  });
}

// ── Overlay helpers ───────────────────────────────────────────────────────────
function showError(title, body, code) {
  document.getElementById('ov-spinner').style.display = 'none';
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-body').textContent  = body || '';
  const codeEl = document.getElementById('ov-code');
  if (code) { codeEl.textContent = code; codeEl.style.display = 'block'; }
}
function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
