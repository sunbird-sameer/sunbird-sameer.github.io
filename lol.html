<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>P2P File Sharing via WebTorrent</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 620px;
      margin: 3em auto;
      padding: 2em;
      background: #f9fafb;
      color: #333;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #222;
      margin-bottom: 1.5rem;
    }
    .section {
      background: white;
      padding: 1.5rem 2rem;
      margin-bottom: 2rem;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    label {
      display: block;
      margin-bottom: 0.7rem;
      font-weight: 600;
      color: #444;
    }
    input[type="file"],
    textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      font-size: 1rem;
      border: 1.8px solid #ddd;
      border-radius: 5px;
      resize: vertical;
      transition: border-color 0.2s ease;
    }
    input[type="file"]:focus,
    textarea:focus {
      border-color: #3b82f6;
      outline: none;
    }
    textarea {
      min-height: 80px;
      font-family: monospace;
    }
    button {
      background-color: #3b82f6;
      color: white;
      font-weight: 700;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: background-color 0.3s ease;
      display: block;
      width: 100%;
    }
    button:hover:not(:disabled) {
      background-color: #2563eb;
    }
    button:disabled {
      background-color: #a5b4fc;
      cursor: not-allowed;
    }
    #status {
      margin-top: 1rem;
      font-weight: 600;
      color: #2563eb;
      min-height: 28px;
    }
    .link-section textarea {
      cursor: text;
      user-select: all;
      background: #f3f4f6;
      border-color: #cbd5e1;
      font-weight: 600;
      color: #1e3a8a;
    }
  </style>
</head>
<body>
  <h1>P2P File Sharing with WebTorrent</h1>

  <div class="section" id="uploader">
    <label for="fileInput">Select a file to share:</label>
    <input type="file" id="fileInput" />
    <button id="seedBtn">Share File</button>

    <div class="link-section" id="linkSection" style="display:none; margin-top: 1.5rem;">
      <label for="magnetLink">Magnet Link (share this with others):</label>
      <textarea id="magnetLink" readonly></textarea>
    </div>
  </div>

  <div class="section" id="downloader">
    <label for="downloadLink">Paste a Magnet Link to download:</label>
    <textarea id="downloadLink" placeholder="Paste magnet link here"></textarea>
    <button id="downloadBtn">Download File</button>
    <div id="status"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/webtorrent/webtorrent.min.js"></script>
  <script>
    const client = new WebTorrent();

    const fileInput = document.getElementById('fileInput');
    const seedBtn = document.getElementById('seedBtn');
    const magnetLinkTxt = document.getElementById('magnetLink');
    const linkSection = document.getElementById('linkSection');
    const downloadLink = document.getElementById('downloadLink');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusDiv = document.getElementById('status');

    seedBtn.addEventListener('click', () => {
      if (!fileInput.files.length) {
        alert('Please select a file to share.');
        return;
      }
      seedBtn.disabled = true;
      statusDiv.textContent = 'Preparing to share your file...';
      client.seed(fileInput.files[0], torrent => {
        magnetLinkTxt.value = torrent.magnetURI;
        linkSection.style.display = 'block';
        seedBtn.disabled = false;
        statusDiv.textContent = 'Seeding... Keep this page open to allow downloads.';
      });
    });

    downloadBtn.addEventListener('click', () => {
      const magnetURI = downloadLink.value.trim();
      if (!magnetURI) {
        alert('Please paste a magnet link to download.');
        return;
      }
      statusDiv.textContent = 'Downloading...';
      client.add(magnetURI, torrent => {
        torrent.files.forEach(file => {
          file.getBlobURL((err, url) => {
            if (err) {
              statusDiv.textContent = 'Error retrieving file.';
              return;
            }
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name;
            a.textContent = `Click here to download "${file.name}"`;
            statusDiv.innerHTML = '';
            statusDiv.appendChild(a);
          });
        });
        torrent.on('done', () => {
          statusDiv.textContent += ' Download complete.';
        });
      });
    });
  </script>
</body>
</html>
