<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>P2P File Sharing via WebTorrent with Short URL</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 2em auto; padding: 1em; }
    input[type=file] { margin-bottom: 1em; }
    textarea { width: 100%; height: 70px; margin-top: 0.5em; }
    button { margin-top: 1em; padding: 0.5em 1em; }
    #status { margin-top: 1em; }
  </style>
</head>
<body>
  <h1>P2P File Sharing with WebTorrent</h1>

  <div id="uploader">
    <input type="file" id="fileInput" />
    <button id="seedBtn">Share File</button>
  </div>

  <div id="linkSection" style="display:none;">
    <p>Share this Magnet Link with others:</p>
    <textarea id="magnetLink" readonly></textarea>
    <button id="shortenBtn">Get Short URL</button>
    <textarea id="shortUrl" readonly style="height: 40px;"></textarea>
  </div>

  <div id="downloader">
    <p>Paste a Magnet Link to download a file:</p>
    <textarea id="downloadLink"></textarea>
    <button id="downloadBtn">Download</button>
    <div id="status"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/webtorrent/webtorrent.min.js"></script>
  <script>
    const client = new WebTorrent();

    const fileInput = document.getElementById('fileInput');
    const seedBtn = document.getElementById('seedBtn');
    const magnetLinkTxt = document.getElementById('magnetLink');
    const linkSection = document.getElementById('linkSection');

    const shortenBtn = document.getElementById('shortenBtn');
    const shortUrlTxt = document.getElementById('shortUrl');

    const downloadLink = document.getElementById('downloadLink');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusDiv = document.getElementById('status');

    seedBtn.addEventListener('click', () => {
      if (!fileInput.files.length) {
        alert('Select a file first!');
        return;
      }
      seedBtn.disabled = true;
      const file = fileInput.files[0];
      client.seed(file, torrent => {
        magnetLinkTxt.value = torrent.magnetURI;
        linkSection.style.display = 'block';
        seedBtn.disabled = false;
        statusDiv.textContent = 'Seeding... Keep this page open to share.';
        // Clear previous short URL if any
        shortUrlTxt.value = '';
      });
    });

    shortenBtn.addEventListener('click', async () => {
      const longUrl = magnetLinkTxt.value.trim();
      if (!longUrl) {
        alert('No magnet link to shorten!');
        return;
      }
      shortenBtn.disabled = true;
      shortUrlTxt.value = 'Generating short URL...';

      try {
        const resp = await fetch('https://api.spoo.me/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: longUrl }),
        });
        if (!resp.ok) throw new Error('Failed to shorten URL');
        const data = await resp.json();
        shortUrlTxt.value = data.shortUrl || 'No short URL received';
      } catch (err) {
        shortUrlTxt.value = 'Error: ' + err.message;
      }
      shortenBtn.disabled = false;
    });

    downloadBtn.addEventListener('click', () => {
      const magnetURI = downloadLink.value.trim();
      if (!magnetURI) {
        alert('Paste a magnet link to download.');
        return;
      }
      statusDiv.textContent = 'Downloading...';
      client.add(magnetURI, torrent => {
        torrent.files.forEach(file => {
          file.getBlobURL((err, url) => {
            if (err) {
              statusDiv.textContent = 'Error retrieving file.';
              return;
            }
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name;
            a.textContent = `Click here to download "${file.name}"`;
            statusDiv.innerHTML = '';
            statusDiv.appendChild(a);
          });
        });
        torrent.on('done', () => {
          statusDiv.textContent += ' Download complete.';
        });
      });
    });
  </script>
</body>
</html>
